<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fitness Tracker</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#111827">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#3b82f6;
--text:#f8fafc;
--muted:#94a3b8;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
padding:16px;
}

.header{
text-align:center;
margin-bottom:24px;
}

.card{
background:var(--card);
padding:18px;
border-radius:20px;
margin-bottom:16px;
box-shadow:0 8px 30px rgba(0,0,0,.3);
}

h1{
font-size:2rem;
}

.subtitle{
color:var(--muted);
}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
background:#334155;
color:white;
font-size:1rem;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-size:1rem;
font-weight:bold;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.stat{
text-align:center;
}

.value{
font-size:2rem;
font-weight:bold;
}

.label{
color:var(--muted);
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:center;
border-bottom:1px solid #334155;
}

canvas{
margin-top:10px;
}

.delete{
background:#dc2626;
padding:8px;
border-radius:8px;
font-size:.8rem;
}

</style>
</head>
<body>

<div class="header">
<h1>💪 Fitness Tracker</h1>
<p class="subtitle">Armhävningar & Situps</p>
</div>

<div class="card">

<input type="number" id="pushups" placeholder="Antal armhävningar">

<input type="number" id="situps" placeholder="Antal situps">

<button onclick="saveWorkout()">
Spara träning
</button>

</div>

<div class="stats">

<div class="card stat">
<div class="value" id="totalPushups">0</div>
<div class="label">Armhävningar</div>
</div>

<div class="card stat">
<div class="value" id="totalSitups">0</div>
<div class="label">Situps</div>
</div>

</div>

<div class="card">
<h2>Utveckling</h2>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h2>Historik</h2>

<table>
<thead>
<tr>
<th>Datum</th>
<th>Armhävningar</th>
<th>Situps</th>
<th></th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>

</div>

<script>

let workouts =
JSON.parse(localStorage.getItem("workouts")) || [];

let chart;

function saveWorkout(){

const pushups =
parseInt(document.getElementById("pushups").value)||0;

const situps =
parseInt(document.getElementById("situps").value)||0;

if(pushups===0 && situps===0) return;

workouts.push({
date:new Date().toLocaleDateString("sv-SE"),
pushups,
situps
});

localStorage.setItem(
"workouts",
JSON.stringify(workouts)
);

document.getElementById("pushups").value="";
document.getElementById("situps").value="";

render();

}

function deleteWorkout(index){

workouts.splice(index,1);

localStorage.setItem(
"workouts",
JSON.stringify(workouts)
);

render();

}

function render(){

let totalPushups=0;
let totalSitups=0;

const history=
document.getElementById("history");

history.innerHTML="";

workouts.forEach((w,index)=>{

totalPushups+=w.pushups;
totalSitups+=w.situps;

history.innerHTML+=`
<tr>
<td>${w.date}</td>
<td>${w.pushups}</td>
<td>${w.situps}</td>
<td>
<button
class="delete"
onclick="deleteWorkout(${index})">
X
</button>
</td>
</tr>
`;

});

document.getElementById("totalPushups")
.innerText=totalPushups;

document.getElementById("totalSitups")
.innerText=totalSitups;

updateChart();

}

function updateChart(){

const labels=workouts.map(w=>w.date);

const pushups=workouts.map(w=>w.pushups);

const situps=workouts.map(w=>w.situps);

if(chart){
chart.destroy();
}

chart = new Chart(
document.getElementById("chart"),
{
type:"line",
data:{
labels,
datasets:[
{
label:"Armhävningar",
data:pushups
},
{
label:"Situps",
data:situps
}
]
}
});

}

render();

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
